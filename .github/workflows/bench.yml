name: Benchmarks

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  bench:
    name: Bench
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@v2
      - run: cargo bench -p helios_core 2>&1 | tee bench-output.txt
      - uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: |
            bench-output.txt
            helios_core/target/criterion/
          retention-days: 30
