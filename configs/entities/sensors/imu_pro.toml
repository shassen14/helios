# configs/entities/sensors/imu_pro.toml
# Corresponds to the `SensorConfig::Imu` enum variant.
kind = "Imu"
# currently the max rate (Hz).
# Simulation time runs at 400 Hz so any higher will not actually run at that rate
rate = 400.0
transform = { translation = [0.0, 0.0, 0.0], rotation = [0.0, 0.0, 0.0] }

# --- Noise Characteristics (sensor FLU axes) ---
# Accelerometer in m/s², gyroscope in rad/s.
accel_noise_stddev = [0.001, 0.001, 0.001]
gyro_noise_stddev = [0.0001, 0.0001, 0.0001]
# Constant offsets in the same units. Gyro bias is the drift rate a stationary
# unit reports and dominates dead-reckoning error; zero models a perfectly
# calibrated part.
accel_bias = [0.0, 0.0, 0.0]
gyro_bias = [0.0, 0.0, 0.0]

# Bus channels the two IMU quantities publish on. Each must match the
# estimator's corresponding input channel in the agent's autonomy stack.
accel_channel = "sensor.imu.accel"
gyro_channel = "sensor.imu.gyro"
