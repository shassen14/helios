# =========================================================================
# == Agent Profile: Pro Car ==
# =========================================================================
# Portable autonomy configuration. No vehicle, sensors, or physics.
# Root-level keys are the fields of AutonomyStack.
# Safe to load in helios_hw without helios_sim.

[world_model]
type = "Separate"
estimator = { from = "components.estimators.ekf_pro" }
mapper = { from = "components.mappers.none" }

[planners]
local_path = { from = "components.planners.a_star" }

[path_following]
kind = "PurePursuit"
max_speed_m_s = 5.0
min_speed_m_s = 0.5
lookahead_distance_m = 4.0
goal_radius = 3.0
max_lateral_acceleration = 3.0
state_source = "ground_truth"

[controllers]
path_follower = { from = "components.controllers.direct_velocity" }