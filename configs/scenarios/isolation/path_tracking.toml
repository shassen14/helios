# configs/scenarios/isolation/path_tracking.toml
# Profile: PathTracking — sensors + real EKF estimator + controller. Static path injected via mock_path.
# No mapper, no planner.
# On exit prints: cross-track error and heading error.
# cargo run --example 06_path_tracking -- --scenario configs/scenarios/isolation/path_tracking.toml

[simulation]
profile          = "path_tracking"
duration_seconds = 30.0
seed             = 42
mock_path        = "configs/fixtures/paths/straight_10m.toml"

[[world.terrains]]
mesh     = "maps/starter_world.glb"
collider = "maps/starter_world_col.glb"
medium   = "air"

[world.atmosphere]
gravity = [0.0, -9.81, 0.0]

[debug]
show_pose_gimbals = true
show_covariance   = true
show_error_line   = true
show_path_trail   = true
show_velocity     = true
show_legend       = true

[metrics]
output_path = "results/path_tracking.csv"

[[agents]]
from          = "agents.ackermann_car_pro"
name          = "PathTracker"
starting_pose = { translation = [0.0, 0.0, 1.0], rotation = [0.0, 0.0, 0.0] }
goal_pose     = { translation = [10.0, 0.0, 0.5] }

# Real EKF estimator (sensors provide measurements).
# Path is provided by MockPathInjectorPlugin (no planner needed).
[agents.autonomy_stack.world_model]
type      = "Separate"
estimator = { from = "components.estimators.ekf_pro" }
mapper    = { from = "components.mappers.none" }

[agents.autonomy_stack.controllers]
path_follower = { from = "components.controllers.pid_path_follower" }
