# =========================================================================
# == Agent Prefab: Professional Ackermann Car ==
# =========================================================================
# Sim-specific prefab: vehicle, sensors, and default poses.
# Autonomy stack is defined in the portable agent profile referenced below.

# --- Default Properties ---
name = "ProCar"
starting_pose = { translation = [0.0, 0.5, 1.0], rotation = [0.0, 0.0, 0.0] }
goal_pose     = { translation = [0.0, 0.5, 0.0] }

# --- Hardware Configuration ---
vehicle  = { from = "vehicles.ackermann_base" }
sensors  = { from = "sensor_suites.ins_pro" }

# --- Software (Autonomy) Configuration ---
# References the portable agent profile. helios_hw loads this same profile directly.
autonomy_stack = { from = "agent_profiles.pro_car" }
