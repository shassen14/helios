# configs/sim/scenarios/isolation/estimation_only.toml
# Sensors + EKF estimator. No mapper, planner, path follower, or controller.
#
# The agent is stationary by construction — nothing commands it — so what this
# scenario measures is estimator behavior at rest: how far the filter's pose
# wanders from a truth that never changes. Any drift in the reported estimate
# is the estimator's own, with no control or planning behavior mixed in.
#
# The subsetting lives in the agent prefab, not here: profiles compose by
# reference and cannot have nodes removed downstream, so isolation means
# referencing a prefab whose stack holds only an estimator.

[simulation]
profile          = "estimation_only"
duration_seconds = 30.0
seed             = 42

[[world.terrains]]
mesh     = "maps/starter_world.glb"
collider = "maps/starter_world_col.glb"
medium   = "air"

[world.atmosphere]
gravity = [0.0, -9.81, 0.0]

[[agents]]
from          = "sim.catalog.agents.ackermann_car_estimation_only"
name          = "EstimationCar"
starting_pose = { translation = [0.0, 0.0, 1.0], rotation = [0.0, 0.0, 0.0] }
