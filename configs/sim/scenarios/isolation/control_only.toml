# configs/scenarios/isolation/control_only.toml
# Profile: ControlOnly — ground-truth estimator + controller. Static path injected via mock_path.
# No sensors, no real EKF, no mapper, no planner.
# On exit prints: rise time, settling time, overshoot, cross-track error, heading error.
# Press H to toggle legend (shows only F1/F4/F6/F8 — no F2/F3/F7/F9).
# cargo run --example 05_control_only -- --scenario configs/scenarios/isolation/control_only.toml

[simulation]
profile          = "control_only"
duration_seconds = 30.0
seed             = 42
mock_path        = "configs/fixtures/paths/straight_10m.toml"

[[world.terrains]]
mesh     = "maps/starter_world.glb"
collider = "maps/starter_world_col.glb"
medium   = "air"

[world.atmosphere]
gravity = [0.0, -9.81, 0.0]

[metrics]
output_path = "results/control_only.csv"

[[agents]]
from          = "sim.catalog.agents.ackermann_car_pro"
name          = "ControlCar"
starting_pose = { translation = [0.0, 0.0, 1.0], rotation = [0.0, 0.0, 0.0] }
goal_pose     = { translation = [10.0, 0.0, 0.5] }

# Ground-truth estimator is injected by MockGroundTruthEstimatorPlugin.
# Path is provided by MockPathInjectorPlugin.
[agents.autonomy_stack.estimators.primary]
from = "runtime.catalog.estimators.ekf_advanced"

[agents.autonomy_stack.controllers]
path_follower = { from = "runtime.catalog.controllers.pid_path_follower" }
