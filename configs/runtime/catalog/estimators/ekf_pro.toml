# configs/runtime/catalog/estimators/ekf_pro.toml
# Pro EKF — low-noise IMU, standard GPS + magnetometer aiding.
kind = "Ekf"

[config]
[config.dynamics]
type = "IntegratedImu"
accel_noise_stddev = 0.2
gyro_noise_stddev = 0.01
accel_bias_instability = 0.05
gyro_bias_instability = 0.005

# GPS aiding — r_diag = noise_stddev² for gps_standard [0.4, 0.4, 0.8]
[[config.aiding]]
sensor_payload = "GpsPosition"
input_channel = "sensor.gps.primary"
r_diag = [0.16, 0.16, 0.64]
model = { kind = "gps_position" }

# Magnetometer aiding — r_diag = noise_stddev² for magnetometer_basic [5.0, 5.0, 5.0]
[[config.aiding]]
sensor_payload = "MagneticField3D"
input_channel = "sensor.mag.body"
r_diag = [25.0, 25.0, 25.0]
model = { kind = "magnetometer", magnetic_field_enu = [0.0, 1.0, 0.0] }
